name: API CI

# P0 (convergence foundation): npm-workspaces monorepo — install at repo root,
# scripts run inside apps/api.

on:
  pull_request:
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/api-ci.yml'
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build:
    name: Typecheck + Test + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck
        working-directory: apps/api
      - run: npm run lint
        working-directory: apps/api
      - run: npm run test
        working-directory: apps/api
      - run: npm run build
        working-directory: apps/api

  integration:
    name: Integration (testcontainers-postgres)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run test:integration
        working-directory: apps/api
