name: API CI

on:
  pull_request:
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-ci.yml'
  push:
    branches: [main]
    paths:
      - 'apps/api/**'

jobs:
  build:
    name: Typecheck + Test + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  integration:
    name: Integration (testcontainers-postgres)
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npm run test:integration
