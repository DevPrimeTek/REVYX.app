name: web-preview-ci

# M0.S2/M0.S3 · Build verification for apps/web-preview/
# Gates PR merges on typecheck + production build success.
# Vercel deployment runs separately via the Vercel GitHub App.

on:
  pull_request:
    paths:
      - 'apps/web-preview/**'
      - 'design/tokens.json'
      - '.github/workflows/web-preview-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/web-preview/**'
      - 'design/tokens.json'

permissions:
  contents: read

jobs:
  build:
    name: Typecheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web-preview

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web-preview/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
